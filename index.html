      if(!Array.isArray(data) || !data.length) break;
      const batch=data.map(r=>({match_id:r.match_id, start_time:r.start_time, duration:r.duration,
        avg_rank_tier:r.avg_rank_tier, lobby_type:r.lobby_type, radiant_win:r.radiant_win,
        rad:toIds(r.radiant_team), dire:toIds(r.dire_team)}));
      collected=collected.concat(batch);
      before=Math.min(...batch.map(x=>x.match_id));
    }
    state.worldErr=null;
    state.worldPublic = (append && state.worldPublic) ? state.worldPublic.concat(collected) : collected;
  }catch(e){
    state.worldErr=(e && e.message) ? e.message : "neznámá chyba";
    if(!append) state.worldPublic=[];
  }
  state.worldPublicLoading=false;
  if(state.tab==="world" && state.worldMode==="public") renderWorldPanel();
}
async function loadWorldPro(append){
  state.worldProLoading=true; renderWorldPanel();
  try{
    let url="https://api.opendota.com/api/proMatches";
    if(append && state.worldPro && state.worldPro.length) url+="?less_than_match_id="+Math.min(...state.worldPro.map(x=>x.match_id));
    const data=await getJSON(url);
    state.worldPro = (append && state.worldPro) ? state.worldPro.concat(data||[]) : (data||[]);
    state.worldProLoading=false;
    if(state.tab==="world" && state.worldMode==="pro") renderWorldPanel();
  }catch(e){ state.worldProLoading=false; if(state.tab==="world") renderWorldPanel(); }
}
function filterWorldPublic(){
  let list=state.worldPublic||[];
  list=list.filter(m=> m.duration==null || m.duration>720);          // delší než 12 min
  const ranked=list.filter(m=> m.lobby_type===7);                    // ranked
  if(ranked.length) list=ranked;                                     // jen když nějaké ranked existují
  if(state.worldRank){ const minT = state.worldRank===8 ? 75 : state.worldRank*10 - 4;
    list=list.filter(m=> m.avg_rank_tier==null || m.avg_rank_tier >= minT); }
  const a=state.worldHeroA, b=state.worldHeroB, rel=state.worldRel;
  if(a){
    list=list.filter(m=>{
      const aRad=m.rad.includes(a), aDire=m.dire.includes(a);
      if(!aRad && !aDire) return false;
      if(b && rel!=="any"){
        const bRad=m.rad.includes(b), bDire=m.dire.includes(b);
        if(!bRad && !bDire) return false;
        const same = (aRad&&bRad)||(aDire&&bDire);
        return rel==="with" ? same : !same;
      }
      return true;
    });
  }
  return list;
}
function heroIconsRow(ids){
  return ids.map(id=>{ const m=heroMap[id]; return m? `<img class="wic" src="${HERO_CDN}${m.short}.png" title="${escapeHtml(m.name)}" alt="">` : ''; }).join("");
}
function midChip(id){ return `<div class="m-id">#${id}<button class="copy-id" data-mid="${id}" title="kopírovat ID (přehrání v Dotě)">⧉</button></div>`; }
function heroSelectOptions(sel){
  const list=Object.entries(heroMap).map(([id,m])=>({id:+id,name:m.name})).sort((a,b)=>a.name.localeCompare(b.name,'cs'));
  return `<option value="0">— hrdina —</option>`+list.map(h=>`<option value="${h.id}" ${sel===h.id?'selected':''}>${escapeHtml(h.name)}</option>`).join("");
}

function renderWorldPanel(){
  const m=state.worldMode;
  const sub=`<div class="seg md-vtoggle">
      <button class="sgb ${m==='public'?'on':''}" data-wm="public">Veřejné hry</button>
      <button class="sgb ${m==='pro'?'on':''}" data-wm="pro">Profíci</button>
    </div>`;

  let body="";
  if(m==="public"){
    const ranks=[[0,"Všechny ranky"],[1,"Herald+"],[2,"Guardian+"],[3,"Crusader+"],[4,"Archon+"],[5,"Legend+"],[6,"Ancient+"],[7,"Divine+"],[8,"Immortal (= Divine 5+)"]];
    const filters=`<div class="match-filters">
        <select id="wRank" class="mf-sel">${ranks.map(r=>`<option value="${r[0]}" ${state.worldRank===r[0]?'selected':''}>${r[1]}</option>`).join("")}</select>
        <select id="wHeroA" class="mf-sel">${heroSelectOptions(state.worldHeroA)}</select>
        <div class="seg"><button class="sgb ${state.worldRel==='any'?'on':''}" data-rel="any">vč.</button><button class="sgb ${state.worldRel==='with'?'on':''}" data-rel="with">s</button><button class="sgb ${state.worldRel==='vs'?'on':''}" data-rel="vs">proti</button></div>
        <select id="wHeroB" class="mf-sel" ${state.worldRel==='any'?'disabled':''}>${heroSelectOptions(state.worldHeroB)}</select>
      </div>`;
    if(state.worldPublic===null){
      body=filters+'<div class="status" style="padding:40px 10px"><div class="spinner"></div>Načítám veřejné zápasy…</div>';
    } else {
      const raw=state.worldPublic||[];
      const afterDur=raw.filter(m=> m.duration==null || m.duration>720);
      const rankedCnt=afterDur.filter(m=> m.lobby_type===7).length;
      const list=filterWorldPublic();
      const diag=`<div class="w-diag">Staženo: <b>${raw.length}</b> · &gt;12 min: <b>${afterDur.length}</b> · ranked: <b>${rankedCnt}</b> · zobrazeno: <b>${list.length}</b>${state.worldErr?` · <span style="color:var(--dire)">chyba: ${escapeHtml(state.worldErr)}</span>`:''}</div>`;
      const rows=list.map(mm=>`<div class="match wmatch" data-mid="${mm.match_id}">
          <div class="w-teams"><div class="w-side ${mm.radiant_win?'won':''}">${heroIconsRow(mm.rad)}</div><span class="w-vs">vs</span><div class="w-side ${!mm.radiant_win?'won':''}">${heroIconsRow(mm.dire)}</div></div>
          <div class="w-meta">${mm.avg_rank_tier?rankText(mm.avg_rank_tier):'—'} · ${fmtDur(mm.duration)} · ${timeAgo(mm.start_time)}</div>
          ${midChip(mm.match_id)}
        </div>`).join("");
      body=filters+diag+`<div class="match-list">${rows|| (state.worldErr
          ? '<div class="empty">Chyba načítání: <span style="color:var(--dire)">'+escapeHtml(state.worldErr)+'</span> — zkus „Načíst další".</div>'
          : '<div class="empty">V téhle dávce nic neodpovídá filtru. Klikej „Načíst další" (přidá další stovky zápasů), zvol nižší rank nebo odeber hrdinu.</div>')}</div>
        <div class="load-more-wrap"><button class="load-more" id="wMore" ${state.worldPublicLoading?'disabled':''}>${state.worldPublicLoading?'Načítám…':'Načíst další'}</button></div>`;
    }
  } else {
    if(state.worldPro===null){
      body='<div class="status" style="padding:40px 10px"><div class="spinner"></div>Načítám profi zápasy…</div>';
    } else {
      const rows=(state.worldPro||[]).map(mm=>`<div class="match wmatch pro" data-mid="${mm.match_id}">
          <div class="w-pro"><b>${escapeHtml(mm.radiant_name||'Radiant')}</b> <span class="${mm.radiant_win?'cw':'cl'}">${mm.radiant_score??''}</span>:<span class="${!mm.radiant_win?'cw':'cl'}">${mm.dire_score??''}</span> <b>${escapeHtml(mm.dire_name||'Dire')}</b></div>
          <div class="w-meta">${escapeHtml(mm.league_name||'')} · ${fmtDur(mm.duration)} · ${timeAgo(mm.start_time)}</div>
          ${midChip(mm.match_id)}
        </div>`).join("");
      body=`<div class="match-list">${rows||'<div class="empty">Žádné profi zápasy.</div>'}</div>
        <div class="load-more-wrap"><button class="load-more" id="wMore" ${state.worldProLoading?'disabled':''}>${state.worldProLoading?'Načítám…':'Načíst další'}</button></div>`;
    }
  }

  $("#panel").innerHTML=`
    <div class="md-top"><div class="draft-intro" style="margin:0">Ranked zápasy z celého světa (jen <b>ranked</b>, delší než <b>12 min</b>). U každého je <b>číslo zápasu</b> (⧉ zkopíruje) — v Dotě přehraješ přes „Sledovat → ID zápasu".</div>${sub}</div>
    ${body}
  `;

  document.querySelectorAll(".md-vtoggle .sgb").forEach(b=>{
    b.onclick=()=>{ state.worldMode=b.dataset.wm;
      if(state.worldMode==="public" && state.worldPublic===null && !state.worldPublicLoading) loadWorldPublic(false);
      else if(state.worldMode==="pro" && state.worldPro===null && !state.worldProLoading) loadWorldPro(false);
      else renderWorldPanel();
    };
  });
  const wr=$("#wRank"); if(wr) wr.onchange=e=>{ state.worldRank=+e.target.value; loadWorldPublic(false); };
  const wa=$("#wHeroA"); if(wa) wa.onchange=e=>{ state.worldHeroA=+e.target.value; renderWorldPanel(); };
  const wb=$("#wHeroB"); if(wb) wb.onchange=e=>{ state.worldHeroB=+e.target.value; renderWorldPanel(); };
  document.querySelectorAll("[data-rel]").forEach(b=>{ b.onclick=()=>{ state.worldRel=b.dataset.rel; renderWorldPanel(); }; });
  const more=$("#wMore"); if(more) more.onclick=()=>{ state.worldMode==="public"?loadWorldPublic(true):loadWorldPro(true); };
  document.querySelectorAll(".match-list .wmatch").forEach(el=>{ el.onclick=()=> openMatchDetail(+el.dataset.mid); });
  wireCopyIds();

  if(state.worldMode==="public" && state.worldPublic===null && !state.worldPublicLoading) loadWorldPublic(false);
  if(state.worldMode==="pro" && state.worldPro===null && !state.worldProLoading) loadWorldPro(false);
}

/* ---------- Meta: nejlepší WR podle pozice a ranku ---------- */
function wrColor(wr){ const p=wr*100; if(p>=54) return 'var(--win-glow)'; if(p>=51) return 'var(--gold)'; if(p>=48) return 'var(--text)'; return 'var(--loss-glow)'; }
async function loadMetaStats(){
  state.metaLoading=true; renderMetaPanel();
  try{
    const data=await getJSON("https://api.opendota.com/api/heroStats");
    state.metaStats = Array.isArray(data) ? data : [];
  }catch(e){ state.metaStats=[]; state.metaErr=e.message; }
  state.metaLoading=false;
  if(state.tab==="meta") renderMetaPanel();
}
function renderMetaPanel(){
  if(state.metaStats===null){
    $("#panel").innerHTML='<div class="status" style="padding:40px 10px"><div class="spinner"></div>Načítám statistiky hrdinů…</div>';
    if(!state.metaLoading) loadMetaStats();
    return;
  }
  const rankOpts=[[0,"Všechny ranky"]].concat(Object.keys(RANKS).map(k=>[+k, (+k===8 ? "Immortal (= Divine+)" : RANKS[k])]));
  const minOpts=[0,50,100,300,1000];
  const filters=`<div class="match-filters">
      <select id="metaRank" class="mf-sel">${rankOpts.map(o=>`<option value="${o[0]}" ${state.metaRank===o[0]?'selected':''}>${o[1]}</option>`).join("")}</select>
      <select id="metaMin" class="mf-sel">${minOpts.map(v=>`<option value="${v}" ${state.metaMinPicks===v?'selected':''}>min. ${v} picků</option>`).join("")}</select>
    </div>`;
  const r=state.metaRank;
  const stats=(state.metaStats||[]).map(h=>{
    let picks=0,wins=0;
    if(r===0){ for(let i=1;i<=8;i++){ picks+=h[i+"_pick"]||0; wins+=h[i+"_win"]||0; } }
    else if(r===8){ picks=(h["7_pick"]||0)+(h["8_pick"]||0); wins=(h["7_win"]||0)+(h["8_win"]||0); } // Immortal data jsou v Divine bracketu
    else { picks=h[r+"_pick"]||0; wins=h[r+"_win"]||0; }
    return { id:h.id, name:h.localized_name||(heroMap[h.id]&&heroMap[h.id].name)||("#"+h.id),
      short:(heroMap[h.id]&&heroMap[h.id].short)||"", picks, wr: picks? wins/picks : 0, pos:heroPositions(h.id) };
  });
  const cols=POSITIONS.map(P=>{
    const list=stats.filter(s=> s.picks>=state.metaMinPicks && s.pos.includes(P.id)).sort((a,b)=> b.wr-a.wr).slice(0,10);
    const rows=list.map((s,i)=>`<div class="meta-row" title="${s.picks.toLocaleString('cs-CZ')} picků">
        <span class="mr-rank">${i+1}</span>
        <img class="mr-ic" src="${HERO_CDN}${s.short}.png" alt="" onerror="this.style.visibility='hidden'">
        <span class="mr-name">${escapeHtml(s.name)}</span>
        <span class="mr-wr" style="color:${wrColor(s.wr)}">${(s.wr*100).toFixed(1)}%</span>
      </div>`).join("") || '<div class="empty" style="padding:14px 6px">Málo dat — sniž min. picků.</div>';
    return `<div class="meta-col"><div class="meta-h">${P.label} <span>${P.sub}</span></div>${rows}</div>`;
  }).join("");
  $("#panel").innerHTML=`
    <div class="draft-intro">Nejlepší <b>win rate</b> hrdinů podle pozice. Přepni si <b>rank</b> a minimální počet picků (ať nevyskakují výkyvy z malého vzorku). Pozice jsou přibližné (běžné meta usage). Data z OpenDoty za poslední měsíc.</div>
    ${filters}
    <div class="meta-grid">${cols}</div>
  `;
  const mr=$("#metaRank"); if(mr) mr.onchange=e=>{ state.metaRank=+e.target.value; renderMetaPanel(); };
  const mm=$("#metaMin"); if(mm) mm.onchange=e=>{ state.metaMinPicks=+e.target.value; renderMetaPanel(); };
}

/* ---------- Živě: hráči online + rekord ---------- */
const LIVE_LS_KEY = "dota_live_v1";
function loadLiveHistory(){
  try{ const r=localStorage.getItem(LIVE_LS_KEY); state.liveHistory = r ? JSON.parse(r) : []; }
  catch(e){ state.liveHistory = []; }
  pruneLive();
}
function pruneLive(){ const cut=Date.now()-24*3600*1000; state.liveHistory=(state.liveHistory||[]).filter(p=>p && p.t>=cut); }
function persistLive(){ try{ localStorage.setItem(LIVE_LS_KEY, JSON.stringify(state.liveHistory)); }catch(e){} }
async function fetchCurrentPlayers(){
  const steam="https://api.steampowered.com/ISteamUserStats/GetNumberOfCurrentPlayers/v1/?appid=570";
  const proxies=[
    u=>"https://corsproxy.io/?url="+encodeURIComponent(u),
    u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u),
  ];
  for(const mk of proxies){
    try{
      const r=await fetch(mk(steam));
      if(!r.ok) continue;
      const d=await r.json();
      const n = d && d.response && d.response.player_count;
      if(typeof n==="number" && n>0) return n;
    }catch(e){}
  }
  throw new Error("zdroj nedostupný (CORS proxy mimo provoz)");
}
async function pollLive(){
  if(state.liveLoading) return;
  state.liveLoading=true; if(state.tab==="live") renderLivePanel();
  try{
    const n=await fetchCurrentPlayers();
    state.liveNow=n; state.liveErr=null;
    state.liveHistory=state.liveHistory||[];
    state.liveHistory.push({t:Date.now(), n});
    pruneLive(); persistLive();
  }catch(e){ state.liveErr=e.message; }
  state.liveLoading=false;
  if(state.tab==="live") renderLivePanel();
}
function live24max(){ let m=null; (state.liveHistory||[]).forEach(p=>{ if(!m||p.n>m.n) m=p; }); return m; }
function liveChartSVG(){
  const hist=(state.liveHistory||[]).slice();
  if(hist.length<2) return '<div class="empty" style="padding:34px 10px">Sbírám data… graf se objeví po pár měřeních (jedno za minutu, nech appku otevřenou).</div>';
  const W=680,H=190,padL=8,padR=10,padT=14,padB=22;
  const xs=hist.map(p=>p.t), ys=hist.map(p=>p.n);
  const minT=xs[0], maxT=xs[xs.length-1];
  let minY=Math.min(...ys), maxY=Math.max(...ys);
  if(minY===maxY){ minY-=Math.max(1,Math.round(minY*0.001)); maxY+=Math.max(1,Math.round(maxY*0.001)); }
  const spanT=Math.max(1,maxT-minT), spanY=maxY-minY;
  const X=t=> padL+(t-minT)/spanT*(W-padL-padR);
  const Y=n=> H-padB-(n-minY)/spanY*(H-padT-padB);
  const line=hist.map(p=>X(p.t).toFixed(1)+","+Y(p.n).toFixed(1)).join(" ");
  const area=`${padL.toFixed(1)},${(H-padB).toFixed(1)} ${line} ${X(maxT).toFixed(1)},${(H-padB).toFixed(1)}`;
  const fmt=n=> n>=1000?(n/1000).toFixed(0)+"k":(""+n);
  const tf=t=> new Date(t).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:200px;display:block">
    <polyline points="${area}" fill="rgba(116,185,78,.12)" stroke="none"/>
    <polyline points="${line}" fill="none" stroke="var(--win-glow)" stroke-width="2" vector-effect="non-scaling-stroke"/>
    <text x="${padL}" y="11" fill="var(--muted)" font-size="11" font-family="sans-serif">${fmt(maxY)}</text>
    <text x="${padL}" y="${H-padB-2}" fill="var(--muted)" font-size="11" font-family="sans-serif">${fmt(minY)}</text>
    <text x="${padL}" y="${H-6}" fill="var(--muted-dim)" font-size="11" font-family="sans-serif" text-anchor="start">${tf(minT)}</text>
    <text x="${W-padR}" y="${H-6}" fill="var(--muted-dim)" font-size="11" font-family="sans-serif" text-anchor="end">${tf(maxT)}</text>
  </svg>`;
}
function renderLivePanel(){
  if(!state.liveTimerStarted){ state.liveTimerStarted=true; setInterval(()=>{ if(state.tab==="live") pollLive(); }, 60000); }
  if(state.liveNow===null && !state.liveLoading && !state.liveErr){ pollLive(); }
  const now=state.liveNow, mx=live24max();
  $("#panel").innerHTML=`
    <div class="draft-intro">Aktuální počet hráčů v klientu <b>Dota 2</b> (zdroj: Steam). Obnovuje se sám každou minutu, dokud máš appku otevřenou.</div>
    <div class="live-cards">
      <div class="live-card">
        <div class="lc-lbl">Hráčů teď v Dotě ${state.liveLoading?'<span class="lc-load">• aktualizuji…</span>':''}</div>
        <div class="lc-big">${now!=null ? now.toLocaleString('cs-CZ') : '—'}</div>
      </div>
      <div class="live-card">
        <div class="lc-lbl">Rekord za 24 h</div>
        <div class="lc-big gold">${mx ? mx.n.toLocaleString('cs-CZ') : '—'}</div>
        <div class="lc-sub">${mx ? ('naměřeno v '+new Date(mx.t).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'})) : 'sbírám…'}</div>
      </div>
    </div>
    <div class="live-chart">${liveChartSVG()}</div>
    ${state.liveErr ? `<div class="empty" style="color:var(--dire)">Nepodařilo se načíst živá data: ${escapeHtml(state.liveErr)}.<br>Veřejná CORS proxy může být dočasně mimo — zkus „Aktualizovat teď" za chvíli.</div>` : ''}
    <div class="load-more-wrap"><button class="load-more" id="liveRef" ${state.liveLoading?'disabled':''}>${state.liveLoading?'Aktualizuji…':'Aktualizovat teď'}</button></div>
    <details class="help" style="margin-top:16px"><summary>Proč tu není „čeká na zápas" podle ranku a regionu?</summary>
      <div class="help-body"><div>Valve <b>nezveřejňuje</b> počty hráčů ve frontě ani rozpad podle ranku/regionu — žádné veřejné API to nedává, takže to z prohlížeče nejde získat. Dostupný je jen <b>celkový počet hráčů v klientu</b> (přes Steam), což zahrnuje i lidi v menu, ne jen ve frontě nebo v zápase. Proto ukazuju tohle číslo a jeho 24h rekord.</div></div>
    </details>
  `;
  const rb=$("#liveRef"); if(rb) rb.onclick=()=>pollLive();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

$("#loadBtn").onclick = load;
$("#accId").addEventListener("keydown",e=>{ if(e.key==="Enter") load(); });
let _searchT=null;
$("#accId").addEventListener("input",()=>{
  const v=($("#accId").value||"").trim();
  clearTimeout(_searchT);
  if(v.length<2 || parseId(v)) return;   // krátké / číslo / odkaz → čekej na Enter nebo Načíst
  _searchT=setTimeout(()=> searchPlayers(v), 220);
});
init();
</script>
