<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dota 2 — Souhrn zápasů</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e13;
    --bg2:#141922;
    --bg3:#1b212c;
    --row:#161b24;
    --row-hover:#1f2632;
    --border:#2a313d;
    --border-soft:#222834;
    --gold:#c8a657;
    --gold-dim:#9c8147;
    --win:#74b94e;
    --win-glow:#9bdb5e;
    --loss:#d24a37;
    --loss-glow:#e8624d;
    --text:#e7e2d4;
    --muted:#8a8676;
    --muted-dim:#5f5d54;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:
      radial-gradient(1200px 600px at 18% -10%, rgba(116,185,78,.07), transparent 60%),
      radial-gradient(1100px 600px at 88% -5%, rgba(210,74,55,.07), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Rajdhani',system-ui,sans-serif;
    min-height:100vh;
    line-height:1.4;
    font-size:16px;
  }
  .wrap{max-width:920px;margin:0 auto;padding:38px 20px 80px;position:relative}

  /* ---------- Header ---------- */
  header{text-align:center;margin-bottom:30px}
  .kicker{
    font-size:.72rem;letter-spacing:.42em;text-transform:uppercase;
    color:var(--gold-dim);font-weight:600;margin-bottom:10px;padding-left:.42em;
  }
  h1{
    font-family:'Cinzel',serif;font-weight:700;
    font-size:clamp(2rem,6vw,3.1rem);line-height:1;
    letter-spacing:.02em;
    background:linear-gradient(180deg,#f1ead5 0%,var(--gold) 70%,var(--gold-dim) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 14px rgba(200,166,87,.18));
  }
  .sub{color:var(--muted);font-size:.95rem;margin-top:10px;font-weight:500}

  /* ---------- Search bar ---------- */
  .searchbar{
    display:flex;gap:10px;margin:26px auto 8px;max-width:560px;flex-wrap:wrap;
  }
  .field{flex:1 1 240px;position:relative}
  input[type=text]{
    width:100%;background:var(--bg2);border:1px solid var(--border);
    color:var(--text);font-family:'Rajdhani',sans-serif;font-weight:600;
    font-size:1.05rem;padding:13px 15px;border-radius:9px;outline:none;
    transition:border-color .15s,box-shadow .15s;
  }
  input[type=text]::placeholder{color:var(--muted-dim);font-weight:500}
  input[type=text]:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(200,166,87,.12)}
  button.load{
    background:linear-gradient(180deg,#d9b766,var(--gold) 60%,var(--gold-dim));
    color:#1a1408;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;
    font-size:1rem;letter-spacing:.06em;text-transform:uppercase;
    padding:0 26px;border-radius:9px;cursor:pointer;
    transition:transform .1s,filter .15s;white-space:nowrap;
  }
  button.load:hover{filter:brightness(1.08)}
  button.load:active{transform:translateY(1px)}
  button.load:disabled{opacity:.5;cursor:default;filter:none}
  .hint{text-align:center;font-size:.82rem;color:var(--muted);max-width:560px;margin:0 auto}
  .hint a{color:var(--gold-dim);text-decoration:none;border-bottom:1px dotted var(--gold-dim)}
  .hint a:hover{color:var(--gold)}

  /* ---------- Status ---------- */
  .status{text-align:center;padding:48px 20px;color:var(--muted);font-size:1.05rem;font-weight:500}
  .status.error{color:var(--loss-glow)}
  .spinner{
    width:34px;height:34px;margin:0 auto 16px;border-radius:50%;
    border:3px solid var(--border);border-top-color:var(--gold);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- Profile card ---------- */
  .profile{
    display:flex;align-items:center;gap:20px;margin:30px 0 4px;
    background:linear-gradient(135deg,var(--bg2),rgba(20,25,34,.4));
    border:1px solid var(--border);border-radius:14px;padding:20px 22px;flex-wrap:wrap;
  }
  .profile.noprof{display:block;background:var(--bg2);border:1px dashed var(--border)}
  .profile.noprof .prank{font-weight:500;line-height:1.5;color:var(--muted);margin-top:4px}
  .profile.noprof .prank b{color:var(--gold-dim)}
  .avatar{
    width:74px;height:74px;border-radius:11px;border:2px solid var(--gold-dim);
    background:var(--bg3);object-fit:cover;flex-shrink:0;
  }
  .pmeta{flex:1 1 180px;min-width:0}
  .pname{font-family:'Cinzel',serif;font-weight:600;font-size:1.45rem;color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prank{color:var(--gold);font-weight:600;font-size:.92rem;letter-spacing:.04em;margin-top:3px}
  .ptotals{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .tstat{text-align:center}
  .tstat .n{font-size:1.8rem;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .tstat .l{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .tstat.w .n{color:var(--win-glow)}
  .tstat.l .n{color:var(--loss-glow)}
  .tstat.wr .n{color:var(--gold)}

  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:5px;margin:28px 0 0;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:thin}
  .tabs::-webkit-scrollbar{height:5px}
  .tabs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .tab{
    flex:1 1 0;min-width:0;background:var(--bg2);border:1px solid var(--border-soft);
    border-bottom:none;color:var(--muted);font-family:'Rajdhani',sans-serif;
    font-weight:600;font-size:.8rem;letter-spacing:.03em;text-transform:uppercase;
    padding:10px 8px;border-radius:9px 9px 0 0;cursor:pointer;
    transition:color .15s,background .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .tab small{display:block;font-size:.58rem;letter-spacing:.01em;text-transform:none;color:var(--muted-dim);font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tab:hover{color:var(--text)}
  .tab.active{background:var(--bg3);color:var(--gold);border-color:var(--border)}
  .tab.active small{color:var(--muted)}

  /* ---------- Controls ---------- */
  .panel{background:var(--bg3);border:1px solid var(--border);border-radius:0 0 14px 14px;padding:16px 18px 20px}
  .controls{display:flex;gap:14px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .controls input[type=text]{padding:9px 12px;font-size:.95rem;flex:1 1 160px;border-radius:7px;background:var(--bg)}
  .minsel{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.85rem;font-weight:600;white-space:nowrap}
  .minsel select{
    background:var(--bg);border:1px solid var(--border);color:var(--text);
    font-family:'Rajdhani',sans-serif;font-weight:600;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:.95rem;
  }

  /* ---------- Table ---------- */
  .tablewrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  thead th{
    text-align:right;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);font-weight:600;padding:6px 10px 10px;cursor:pointer;user-select:none;
    border-bottom:1px solid var(--border);white-space:nowrap;
  }
  thead th:first-child{text-align:left}
  thead th.sortable:hover{color:var(--gold)}
  thead th .arr{color:var(--gold);font-size:.7rem;margin-left:3px}
  tbody td{padding:9px 10px;border-bottom:1px solid var(--border-soft);font-size:1rem;font-weight:600;text-align:right}
  tbody tr:hover{background:var(--row-hover)}
  tbody tr:last-child td{border-bottom:none}
  .hero{display:flex;align-items:center;gap:11px;text-align:left}
  .hero img{width:30px;height:30px;border-radius:5px;background:var(--bg);flex-shrink:0;border:1px solid var(--border-soft)}
  .hero span{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cw{color:var(--win-glow)}
  .cl{color:var(--loss-glow)}
  .cg{color:var(--text)}

  /* win/loss bar */
  .wrcell{min-width:160px}
  .barbox{display:flex;align-items:center;gap:10px;justify-content:flex-end}
  .pct{font-weight:700;font-size:1rem;min-width:46px;text-align:right;font-variant-numeric:tabular-nums}
  .bar{
    position:relative;height:9px;width:96px;border-radius:5px;overflow:hidden;
    background:var(--loss);box-shadow:inset 0 0 0 1px rgba(0,0,0,.25);flex-shrink:0;
  }
  .bar .fill{
    position:absolute;left:0;top:0;bottom:0;
    background:linear-gradient(90deg,var(--win),var(--win-glow));
    box-shadow:0 0 8px rgba(155,219,94,.4);
  }
  .empty{text-align:center;color:var(--muted);padding:34px 10px;font-size:1rem;font-weight:500}
  .note{font-size:.84rem;color:var(--muted);margin-bottom:13px;line-height:1.5}
  .note b{color:var(--gold-dim);font-weight:700}
  .kda-sub{color:var(--muted-dim);font-weight:500;font-size:.76rem}

  /* ---------- Draft / counter-pick ---------- */
  .ic{border-radius:4px;background:var(--bg);object-fit:cover}
  img.ic{display:block}
  .draft-intro{font-size:.9rem;color:var(--muted);margin-bottom:14px;line-height:1.5}
  .draft-intro b{color:var(--gold-dim)}
  .enemy-row{display:flex;align-items:center;gap:10px;margin-bottom:15px;flex-wrap:wrap}
  .enemy-label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .chips{display:flex;gap:7px;flex-wrap:wrap;flex:1 1 auto}
  .chips-empty{color:var(--muted-dim);font-size:.9rem;font-style:italic}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:4px 6px 4px 5px;border-radius:20px;font-size:.92rem;font-weight:600}
  .chip img{border-radius:50%}
  .chip .cn{white-space:nowrap}
  .chip .cx{background:none;border:none;color:var(--muted);font-size:1.05rem;line-height:.9;cursor:pointer;padding:0 2px;font-weight:700}
  .chip:hover .cx{color:var(--text)}
  .chip.enemy{border-color:var(--loss)} .chip.enemy .cx:hover{color:var(--loss-glow)}
  .chip.ally{border-color:var(--win)} .chip.ally .cx:hover{color:var(--win-glow)}
  .lane-badge{background:var(--bg);border:1px solid var(--border);color:var(--gold);font-family:inherit;font-weight:800;font-size:.72rem;min-width:20px;height:20px;border-radius:10px;cursor:default;padding:0 6px;line-height:1}
  .lane-badge.multi{cursor:pointer}
  .lane-badge.multi:hover{border-color:var(--gold);background:var(--bg3)}
  .enemy-label.red{color:var(--loss-glow)}
  .enemy-label.green{color:var(--win-glow)}
  .pe.lane-foe{outline:2px solid var(--gold);outline-offset:1px;border-radius:5px;padding:1px 4px}
  .enemy-label.gold{color:var(--gold)}
  .fav-chip{border-color:var(--gold-dim)}
  .fav-chip .cx{color:var(--gold-dim)} .fav-chip:hover .cx{color:var(--gold)}
  .fav-star{position:absolute;top:3px;right:5px;font-size:.82rem;color:var(--muted-dim);line-height:1}
  .fav-star.on{color:var(--gold)}
  .hg:hover .fav-star{color:var(--muted)} .hg:hover .fav-star.on{color:var(--gold)}
  .grade{display:inline-block;border:1.5px solid;border-radius:6px;font-weight:800;font-size:.8rem;padding:1px 6px;min-width:30px;text-align:center}
  .score-num{margin-left:9px;font-weight:800;font-size:1.08rem;font-variant-numeric:tabular-nums}
  .pref-plus{margin-left:7px;font-size:.7rem;font-weight:700;color:var(--gold)}
  .score-cell{white-space:nowrap}
  .fav-row{background:none;border:none;color:var(--muted-dim);font-size:1rem;cursor:pointer;padding:0 7px 0 0;line-height:1;margin-right:1px}
  .fav-row.on{color:var(--gold)}
  .fav-row:hover{color:var(--gold)}
  tr.pref-row td{background:rgba(200,166,87,.06)}
  .go-build{cursor:pointer;border-bottom:1px dotted transparent}
  .cnt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0 4px}
  .cnt-col{background:var(--bg);border:1px solid var(--border-soft);border-radius:10px;padding:8px 8px 10px}
  .cnt-h{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:3px 4px 8px;margin-bottom:4px;border-bottom:1px solid var(--border-soft)}
  .cnt-h.bad{color:var(--loss-glow)} .cnt-h.good{color:var(--win-glow)}
  .cnt-row{display:flex;align-items:center;gap:8px;padding:3px 4px;border-radius:6px}
  .cnt-row:hover{background:var(--bg3)}
  .cnt-ic{width:26px;height:26px;border-radius:4px;background:var(--bg2);flex-shrink:0}
  .cnt-name{flex:1;font-size:.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cnt-wr{font-weight:700;font-size:.84rem;font-variant-numeric:tabular-nums}
  .hc-target{display:flex;align-items:center;gap:12px;margin:6px 0 14px}
  .hc-grid{display:grid;grid-template-columns:repeat(5,minmax(168px,1fr));gap:10px;overflow-x:auto;padding-bottom:4px}
  .hc-col{background:var(--bg);border:1px solid var(--border-soft);border-radius:10px;padding:8px}
  .hc-h{font-size:.82rem;font-weight:800;color:var(--gold);padding:2px 4px 8px;border-bottom:1px solid var(--border-soft);margin-bottom:4px;display:flex;justify-content:space-between;align-items:baseline}
  .hc-h span{font-size:.68rem;color:var(--muted);font-weight:600;text-transform:uppercase}
  .hc-row{display:flex;align-items:center;gap:7px;padding:4px;border-radius:6px}
  .hc-row:hover{background:var(--bg3)}
  .hc-rank{width:14px;text-align:center;color:var(--muted-dim);font-size:.72rem;font-weight:700;flex-shrink:0}
  .hc-ic{width:26px;height:26px;border-radius:4px;background:var(--bg2);flex-shrink:0}
  .hc-name{flex:1;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hc-adv{font-weight:800;font-size:.82rem;font-variant-numeric:tabular-nums}
  .hc-wr2{font-size:.74rem;color:var(--muted);font-variant-numeric:tabular-nums;min-width:30px;text-align:right}
  .hc-prewarm{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .hc-pw-status{font-size:.82rem;color:var(--gold-dim);font-weight:600}
  .hc-brk{font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:6px}
  .hc-brk select{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.82rem;padding:6px 8px;border-radius:8px;cursor:pointer}
  @media(max-width:640px){ .hc-grid{grid-template-columns:repeat(5,minmax(150px,1fr))} }
  @media(max-width:560px){ .cnt-grid{grid-template-columns:1fr} }
  .go-build:hover{color:var(--gold);border-bottom-color:var(--gold-dim)}
  .build-head{display:flex;align-items:center;gap:14px;margin:4px 0 18px}
  .build-head img{border-radius:9px;border:2px solid var(--gold-dim)}
  .bh-name{font-family:'Cinzel',serif;font-weight:600;font-size:1.4rem;color:var(--text)}
  .bh-sub{color:var(--gold-dim);font-weight:600;font-size:.86rem;margin-top:3px}
  .bsec{margin-bottom:14px}
  .bsec-t{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px}
  .items{display:flex;gap:7px;flex-wrap:wrap}
  .iitem{width:44px;height:32px;border-radius:5px;border:1px solid var(--border-soft);background:var(--bg);object-fit:cover}
  .tl td .iitem{width:36px;height:27px}
  .hg.sel{border-color:var(--gold);background:var(--bg3);color:var(--gold)}
  .build-inline:not(:empty){margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
  .build-close{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:1.15rem;font-weight:700;line-height:1;flex-shrink:0}
  .build-close:hover{color:var(--text);border-color:var(--gold-dim)}
  .match-list{display:flex;flex-direction:column;gap:7px}
  .match{display:flex;align-items:center;gap:13px;background:var(--bg3);border:1px solid var(--border-soft);border-left:4px solid var(--loss);border-radius:9px;padding:9px 13px;text-decoration:none;color:var(--text);flex-wrap:wrap}
  .match.w{border-left-color:var(--win)}
  .match:hover{background:var(--row-hover);border-color:var(--border)}
  .m-res{font-weight:700;font-size:.76rem;letter-spacing:.04em;text-transform:uppercase;width:56px;flex-shrink:0}
  .match.w .m-res{color:var(--win-glow)} .match.l .m-res{color:var(--loss-glow)}
  .m-hero{display:flex;align-items:center;gap:9px;flex:1 1 150px;min-width:0}
  .m-hero img{border-radius:6px;flex-shrink:0}
  .m-htxt{min-width:0}
  .m-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .m-mode{font-size:.73rem;color:var(--muted);font-weight:600}
  .m-kda,.m-stat{text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
  .m-kda b,.m-stat b{display:block;font-weight:700;font-size:.95rem}
  .m-kda span,.m-stat span{font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-dim)}
  .m-kda{width:66px}.m-stat{width:44px}
  .m-items{display:flex;gap:3px;flex-wrap:wrap}
  .m-items .iitem{width:32px;height:24px}
  .match{cursor:pointer}
  .match-filters{display:flex;align-items:center;gap:10px;margin-bottom:13px;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .sgb{background:var(--bg2);border:none;color:var(--muted);font-family:inherit;font-weight:700;font-size:.85rem;padding:7px 13px;cursor:pointer}
  .sgb:not(:last-child){border-right:1px solid var(--border)}
  .sgb.on{background:var(--bg3);color:var(--gold)}
  .mf-sel{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-weight:600;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:.88rem}
  .mf-count{font-size:.8rem;color:var(--muted);font-weight:600;margin-left:auto}
  .md-back{background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-weight:700;font-size:.86rem;padding:8px 14px;border-radius:8px;cursor:pointer;margin-bottom:14px}
  .md-back:hover{color:var(--text);border-color:var(--gold-dim)}
  .md-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .md-top .md-back{margin-bottom:0}
  table.sb.sb-ext{min-width:900px}
  .m-right{margin-left:auto;text-align:right;flex-shrink:0}
  .m-ago{font-size:.73rem;color:var(--muted);font-weight:600}
  .m-id{font-size:.7rem;color:var(--muted-dim);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:4px;justify-content:flex-end}
  .copy-id{background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;cursor:pointer;font-size:.72rem;line-height:1;padding:1px 5px}
  .copy-id:hover{color:var(--gold);border-color:var(--gold-dim)}
  .md-mid{font-size:.82rem;color:var(--muted);font-weight:600;margin-top:6px;display:inline-flex;align-items:center;gap:6px}
  .md-mid b{color:var(--text)}
  .wmatch{align-items:center}
  .w-teams{display:flex;align-items:center;gap:8px;flex:1 1 280px;flex-wrap:wrap}
  .w-side{display:flex;gap:2px;padding:3px 5px;border-radius:6px;flex-wrap:wrap}
  .w-side.won{background:rgba(116,185,78,.12);outline:1px solid rgba(116,185,78,.35)}
  .w-vs{color:var(--muted-dim);font-size:.72rem;font-weight:700}
  .wic{width:26px;height:26px;border-radius:4px;background:var(--bg)}
  .w-meta{font-size:.74rem;color:var(--muted);font-weight:600;flex:0 0 auto}
  .w-pro{flex:1 1 240px;font-weight:600}
  .w-pro b{font-weight:700}
  .w-diag{font-size:.74rem;color:var(--muted);background:var(--bg2);border:1px solid var(--border-soft);border-radius:7px;padding:6px 10px;margin-bottom:10px}
  .w-diag b{color:var(--text)}
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
  .meta-col{background:var(--bg2);border:1px solid var(--border-soft);border-radius:10px;padding:8px 8px 10px}

/* ---------- Persistent matchup cache (localStorage; works when run locally) ---------- */
const MU_LS_KEY = "dota_matchups_v2";
const MU_TTL = 7*24*3600*1000; // 7 dní

function loadMatchupCache(){
  try{
    const raw = localStorage.getItem(MU_LS_KEY);
    if(!raw) return;
    const obj = JSON.parse(raw), now = Date.now();
    Object.entries(obj).forEach(([id,rec])=>{
      if(rec && rec.t && rec.map && (now-rec.t) < MU_TTL) state.matchupCache[id] = rec.map;
    });
  }catch(e){ /* localStorage nedostupný (např. náhled) – cache jen v paměti */ }
}
function saveMatchup(id, map){
  state.matchupCache[id] = map;
  try{
    let obj = {};
    try{ obj = JSON.parse(localStorage.getItem(MU_LS_KEY) || "{}"); }catch(_){ obj = {}; }
    obj[id] = { t: Date.now(), map };
    localStorage.setItem(MU_LS_KEY, JSON.stringify(obj));
  }catch(e){ /* ignoruj – cache zůstane v paměti */ }
}
loadMatchupCache();

function savePreferred(){

function togglePreferred(id){

function persistAccounts(){ try{ localStorage.setItem(ACC_LS_KEY, JSON.stringify(state.savedAccounts)); }catch(e){} }
function isAccSaved(id){ return state.savedAccounts.some(a=> +a.id===+id); }
function saveAccount(a){

// Skóre 1–100 -> známka
function gradeInfo(s){
  if(s>=92) return {g:"S+", c:"#ffd24a"};
  if(s>=82) return {g:"S",  c:"var(--gold)"};
  if(s>=72) return {g:"A",  c:"var(--win-glow)"};
  if(s>=60) return {g:"B",  c:"#9bcf6a"};
  if(s>=45) return {g:"C",  c:"var(--text)"};
  if(s>=30) return {g:"D",  c:"#d99a5b"};
  if(s>=1)  return {g:"E",  c:"var(--loss-glow)"};
  return {g:"F", c:"#ff4d4d"};
}

const sleep = ms => new Promise(r=>setTimeout(r,ms));
function cachedCount(){ return Object.keys(heroMap).filter(id=> state.matchupCache[id]).length; }
function pwRefresh(extra){
  const total=Object.keys(heroMap).length, c=cachedCount();
  const s=$("#prewarmStatus"); if(s) s.textContent = extra || `${c} / ${total} hrdinů v cache`;
  const f=$("#prewarmFill"); if(f) f.style.width=(total?Math.round(c/total*100):0)+"%";
  const b=$("#prewarmBtn"); if(b){ b.disabled=state.prewarming; b.textContent = state.prewarming ? "Stahuji…" : "⬇ Přednačíst všechny hrdiny"; }
}
async function prewarmAll(){
  if(state.prewarming) return;
  if(!Object.keys(heroMap).length){ return; }
  state.prewarming=true; pwRefresh("Spouštím…");
  const ids=Object.keys(heroMap).map(Number).filter(id=> !state.matchupCache[id]);
  if(!ids.length){ state.prewarming=false; pwRefresh("Vše už je v cache ✓"); return; }

  const CONC=4;           // paralelně, ať nepřekročíme ~60/min
  let idx=0, fails=0;
  async function worker(){
    while(idx<ids.length){
      const id=ids[idx++];
      let ok=false;
      for(let a=0; a<3 && !ok; a++){
        try{
          const data=await getJSON(`https://api.opendota.com/api/heroes/${id}/matchups`);
          const map={}; (data||[]).forEach(r=>{ map[r.hero_id]={g:r.games_played||0,w:r.wins||0}; });
          saveMatchup(id,map); ok=true;
        }catch(e){ await sleep(1500*(a+1)); } // backoff při limitu
      }
      if(!ok) fails++;
      pwRefresh();
    }
  }
  await Promise.all(Array.from({length:CONC},()=>worker()));
  state.prewarming=false;
  pwRefresh(fails ? `Hotovo, ${cachedCount()}/${Object.keys(heroMap).length} (${fails} se nepodařilo – zkus znovu)` : "Hotovo ✓ vše v cache");
  if(state.tab==="draft" && state.draftEnemies.length) renderDraftResults();
}

function rankText(tier){
  if(!tier) return "Nehodnoceno";
  const medal = Math.floor(tier/10), star = tier%10;
  const name = RANKS[medal];
  if(!name) return "Nehodnoceno";
  if(medal===8) return "Immortal";
  return name + (star ? " " + star : "");
}

function parseId(raw){
  const m = (raw||"").match(/\d{3,}/);
  return m ? m[0] : "";
}

const _sleep=ms=>new Promise(r=>setTimeout(r,ms));
let _inflight=0; const _qwaiters=[];
function _acquire(){ return new Promise(res=>{ if(_inflight<6){ _inflight++; res(); } else _qwaiters.push(res); }); }
function _release(){ if(_qwaiters.length){ _qwaiters.shift()(); } else { _inflight--; } }
async function getJSON(url){
  await _acquire();
  try{
    for(let a=0;a<5;a++){
      const r=await fetch(url);
      if(r.status===429){ await _sleep(1200*(a+1)); continue; } // limit OpenDoty – počkej a zkus znovu
      if(!r.ok) throw new Error("HTTP "+r.status);
      return await r.json();
    }
    throw new Error("HTTP 429");
  } finally { _release(); }
}

async function load(){
  const raw = ($("#accId").value||"").trim();
  if(!raw){ content.innerHTML = '<div class="status error">Zadej Steam jméno, account ID nebo odkaz na profil.</div>'; return; }
  const id = parseId(raw);
  if(id) return loadProfile(id);
  return searchPlayers(raw);
}

async function searchFetch(q){
  // mimo frontu getJSON, ať hledání nečeká na ostatní dotazy
  const r = await fetch("https://api.opendota.com/api/search?q="+encodeURIComponent(q));
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}
function renderSearchResults(list){

    ${list.map(p=>{

function prepSearch(res){
  const arr = (res||[]).filter(p=>p && p.account_id);
  arr.sort((a,b)=> (new Date(b.last_match_time||0)) - (new Date(a.last_match_time||0)));
  return arr.slice(0,18);
}
async function searchPlayers(q){
  const seq = (state.searchSeq = (state.searchSeq||0)+1);
  const key = q.toLowerCase();
  state.searchCache = state.searchCache || {};
  if(state.searchCache[key]){ renderSearchResults(state.searchCache[key]); return; } // hned z paměti
  $("#loadBtn").disabled = true;
  content.innerHTML = '<div class="status"><div class="spinner"></div>Hledám hráče „'+escapeHtml(q)+'"…</div>';
  try{
    const res = await searchFetch(q);
    if(seq!==state.searchSeq) return;
    const list = prepSearch(res);
    state.searchCache[key] = list;
    renderSearchResults(list);
  }catch(e){
    if(seq!==state.searchSeq) return;
    content.innerHTML = '<div class="status error">Hledání selhalo ('+escapeHtml(e.message)+'). OpenDota má limit ~60 dotazů/min — zkus to za chvíli.</div>';
  }finally{
    $("#loadBtn").disabled = false;
  }
}

async function loadProfile(id){
  $("#loadBtn").disabled = true;
  content.innerHTML = '<div class="status"><div class="spinner"></div>Načítám zápasy hráče…</div>';

  try{
    // hero list (cached after first load)
    if(!Object.keys(heroMap).length){
      const heroes = await getJSON("https://api.opendota.com/api/heroes");
      heroes.forEach(h=>{
        heroMap[h.id] = { name:h.localized_name, short:h.name.replace("npc_dota_hero_",""), roles:h.roles||[] };
      });
    }

    const [profile, wl, hstats] = await Promise.all([
      getJSON(`https://api.opendota.com/api/players/${id}`),
      getJSON(`https://api.opendota.com/api/players/${id}/wl`),
      getJSON(`https://api.opendota.com/api/players/${id}/heroes`),
    ]);

    if(!profile || !profile.profile){
      content.innerHTML = '<div class="status error">Hráč nenalezen, nebo má soukromou historii zápasů.<br>Zkontroluj ID a v Dota 2 zapni „Expose Public Match Data“.</div>';
      $("#loadBtn").disabled = false;
      return;
    }

    state.accId = id;
    state.loaded = true;
    state.curAccount = { id:+id, name:profile.profile.personaname||"", avatar:profile.profile.avatarfull||profile.profile.avatar||"" };
    state.farmLoaded = false; state.farmLoading = false; state.farmHeroes = [];
    state.matchHist = null; state.matchHistLoaded = false; state.matchHistLoading = false;
    state.laneStats = null; state.laneLoading = false; state.laneProg = 0; state.laneByMatch = {};
    state.parseRunning = false; state.parseMsg = "";
    state.matchFilter = {result:"all", mode:"all", hero:0}; state.matchDetailId = null;
    state.draftEnemies = []; state.draftAllies = []; state.draftPos = null; state.laneOf = {};
    state.pickMode = "enemy"; state.draftPickerSearch = "";
    state.buildHero = null; state.buildPickerSearch = "";
    state.tab = "self"; state.sortKey = "g"; state.sortDir = -1;

    state.heroes = (hstats||[]).map(h=>{
      const meta = heroMap[h.hero_id] || {name:"Hrdina #"+h.hero_id, short:""};
      return {
        id:h.hero_id, name:meta.name, short:meta.short,
        self:{ g:h.games||0, w:h.win||0 },
        with:{ g:h.with_games||0, w:h.with_win||0 },
        against:{ g:h.against_games||0, w:h.against_win||0 },
      };
    });

    render(profile, wl);
  }catch(e){
    content.innerHTML = '<div class="status error">Nepodařilo se načíst data ('+e.message+').<br>Zkontroluj ID a připojení. OpenDota má limit ~60 dotazů/min.</div>';
  }finally{
    $("#loadBtn").disabled = false;
  }
}

      ${tabBtn("against","Proti hrdinovi","v nepřátelském týmu")}
      ${tabBtn("matches","Zápasy","historie posledních her")}
      ${tabBtn("farm","Farma","GPM · XPM · LH · KDA")}
      ${tabBtn("draft","Protipick","koho pickovat + build")}
      ${tabBtn("counter","Hardcounter","countery po pozicích")}
      ${tabBtn("world","Svět","veřejné + pro zápasy")}
      ${tabBtn("meta","Meta","nejlepší WR podle pozice")}

function renderPanel(){
  if(state.matchDetailId){ renderMatchDetail(); return; }

function tabBtn(key,label,desc){
  return `<button class="tab ${state.tab===key?'active':''}" data-tab="${key}">${label}<small>${desc}</small></button>`;
}
function setActiveTab(){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===state.tab));
}

function renderTable(){
  if(state.tab==="farm"){ renderFarm(); return; }
  renderHeroTable();
}

function renderHeroTable(){
  const k = state.tab;
  let rows = state.heroes.map(h=>{
    const d = h[k];
    const g = d.g, w = d.w, l = g-w;
    return { name:h.name, short:h.short, g, w, l, wr: g? w/g : 0 };
  }).filter(r=> r.g >= state.minGames);

  if(state.search.trim()){
    const q = state.search.trim().toLowerCase();
    rows = rows.filter(r=> r.name.toLowerCase().includes(q));
  }

  const dir = state.sortDir;
  rows.sort((a,b)=>{
    const av=a[state.sortKey], bv=b[state.sortKey];
    if(av<bv) return -1*dir;
    if(av>bv) return 1*dir;
    return b.g-a.g; // tiebreak
  });

  const labelSelf = state.tab==="self";
  const arr = key => state.sortKey===key ? `<span class="arr">${state.sortDir<0?"▼":"▲"}</span>` : "";

  let html = `<table>
    <thead><tr>
      <th>Hrdina</th>
      <th class="sortable" data-k="g">Zápasy${arr("g")}</th>
      <th class="sortable" data-k="w">Výhry${arr("w")}</th>
      <th class="sortable" data-k="l">Prohry${arr("l")}</th>
      <th class="sortable wrcell" data-k="wr">Win rate${arr("wr")}</th>
    </tr></thead><tbody>`;

  if(!rows.length){
    html += `</tbody></table><div class="empty">Žádní hrdinové neodpovídají filtru (zkus snížit „min. zápasů“).</div>`;
  } else {
    rows.forEach(r=>{
      const pct = Math.round(r.wr*1000)/10;
      const icon = r.short ? `<img src="${HERO_CDN}${r.short}.png" alt="" onerror="this.style.visibility='hidden'">` : `<img alt="" style="visibility:hidden">`;
      html += `<tr>
        <td class="hero">${icon}<span>${escapeHtml(r.name)}</span></td>
        <td class="cg">${r.g}</td>
        <td class="cw">${r.w}</td>
        <td class="cl">${r.l}</td>
        <td class="wrcell"><div class="barbox">
          <span class="pct" style="color:${pct>=50?'var(--win-glow)':'var(--loss-glow)'}">${pct}%</span>
          <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
        </div></td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  $("#tbl").innerHTML = html;

  document.querySelectorAll("th.sortable").forEach(th=>{
    th.onclick = ()=>{
      const key = th.dataset.k;
      if(state.sortKey===key){ state.sortDir*=-1; }
      else { state.sortKey=key; state.sortDir=-1; }
      renderTable();
    };
  });
}

/* ---------- Farm / benchmarks ---------- */
function renderFarm(){
  if(!state.farmLoaded){
    $("#tbl").innerHTML = '<div class="status" style="padding:42px 10px">'
      + '<div class="spinner"></div>Počítám benchmarky ze všech tvých zápasů…<br>'
      + '<span style="font-size:.82rem;color:var(--muted-dim)">(u většího počtu zápasů to může chvíli trvat)</span></div>';
    if(!state.farmLoading) loadFarm();
    return;
  }

  let rows = state.farmHeroes.filter(r=> r.g >= state.minGames);
  if(state.search.trim()){
    const q = state.search.trim().toLowerCase();
    rows = rows.filter(r=> r.name.toLowerCase().includes(q));
  }
  const dir = state.sortDir;
  rows.sort((a,b)=>{
    const av=a[state.sortKey], bv=b[state.sortKey];
    if(av<bv) return -1*dir;
    if(av>bv) return 1*dir;
    return b.g-a.g;
  });
  const arr = key => state.sortKey===key ? `<span class="arr">${state.sortDir<0?"▼":"▲"}</span>` : "";

  let html = `<div class="note">Průměry napříč všemi zápasy. <b>GPM</b>/<b>XPM</b> = zlato a zkušenosti za minutu, <b>LH</b> = last hity na zápas, <b>KDA</b> = (zabití+asistence)/úmrtí (malé číslo vpravo je průměr K/D/A).</div>
  <table><thead><tr>
    <th>Hrdina</th>
    <th class="sortable" data-k="g">Zápasy${arr("g")}</th>
    <th class="sortable" data-k="wr">Win rate${arr("wr")}</th>
    <th class="sortable" data-k="gpm">GPM${arr("gpm")}</th>
    <th class="sortable" data-k="xpm">XPM${arr("xpm")}</th>
    <th class="sortable" data-k="lh">LH${arr("lh")}</th>
    <th class="sortable" data-k="kda">KDA${arr("kda")}</th>
  </tr></thead><tbody>`;

  if(!rows.length){
    const reason = state.farmHeroes.length
      ? 'Žádní hrdinové neodpovídají filtru — zkus snížit „min. zápasů“ nebo vymazat text v hledání.'
      : 'Nepodařilo se načíst žádné zápasy. Účet má možná neveřejnou historii zápasů.';
    html += `</tbody></table><div class="empty">${reason}</div>`;
  } else {
    rows.forEach(r=>{
      const pct = Math.round(r.wr*1000)/10;
      const icon = r.short ? `<img src="${HERO_CDN}${r.short}.png" alt="" onerror="this.style.visibility='hidden'">` : `<img alt="" style="visibility:hidden">`;
      html += `<tr>
        <td class="hero">${icon}<span>${escapeHtml(r.name)}</span></td>
        <td class="cg">${r.g}</td>
        <td><span class="pct" style="color:${pct>=50?'var(--win-glow)':'var(--loss-glow)'}">${pct}%</span></td>
        <td style="color:${gpmColor(r.gpm)};font-weight:700">${r.gpm}</td>
        <td class="cg">${r.xpm}</td>
        <td class="cg">${r.lh}</td>
        <td style="color:${kdaColor(r.kda)};font-weight:700">${r.kda.toFixed(2)} <span class="kda-sub">${r.k.toFixed(1)}/${r.d.toFixed(1)}/${r.as.toFixed(1)}</span></td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  $("#tbl").innerHTML = html;

  document.querySelectorAll("th.sortable").forEach(th=>{
    th.onclick = ()=>{
      const key = th.dataset.k;
      if(state.sortKey===key){ state.sortDir*=-1; }
      else { state.sortKey=key; state.sortDir=-1; }
      renderTable();
    };
  });
}

async function loadFarm(){
  state.farmLoading = true;
  try{
    const fields = ["hero_id","player_slot","radiant_win","duration","kills","deaths","assists","gold_per_min","xp_per_min","last_hits"];
    const url = `https://api.opendota.com/api/players/${state.accId}/matches?` + fields.map(f=>"project="+f).join("&");
    const matches = await getJSON(url);
    const agg = {};
    (matches||[]).forEach(m=>{
      const hid = m.hero_id; if(!hid) return;
      const a = agg[hid] || (agg[hid]={g:0,w:0,gpm:0,gpmN:0,xpm:0,xpmN:0,lh:0,lhN:0,k:0,d:0,as:0});
      a.g++;
      if((m.player_slot<128)===m.radiant_win) a.w++;
      if(m.gold_per_min!=null){ a.gpm+=m.gold_per_min; a.gpmN++; }
      if(m.xp_per_min!=null){ a.xpm+=m.xp_per_min; a.xpmN++; }
      if(m.last_hits!=null){ a.lh+=m.last_hits; a.lhN++; }
      a.k+=m.kills||0; a.d+=m.deaths||0; a.as+=m.assists||0;
    });
    state.farmHeroes = Object.entries(agg).map(([hid,a])=>{
      const meta = heroMap[hid] || {name:"Hrdina #"+hid, short:""};
      return {
        id:+hid, name:meta.name, short:meta.short,
        g:a.g, wr:a.g?a.w/a.g:0,
        gpm:a.gpmN?Math.round(a.gpm/a.gpmN):0,
        xpm:a.xpmN?Math.round(a.xpm/a.xpmN):0,
        lh:a.lhN?Math.round(a.lh/a.lhN):0,
        k:a.k/a.g, d:a.d/a.g, as:a.as/a.g,
        kda:(a.k+a.as)/Math.max(1,a.d),
      };
    });
    state.farmLoaded = true; state.farmLoading = false;
    if(state.tab==="farm") renderTable();
  }catch(e){
    state.farmLoading = false;
    if(state.tab==="farm" && $("#tbl")){
      $("#tbl").innerHTML = '<div class="empty" style="color:var(--loss-glow)">Nepodařilo se načíst zápasy pro benchmarky ('+e.message+').</div>';
    }
  }
}

function gpmColor(v){ if(v>=600) return 'var(--win-glow)'; if(v>=480) return 'var(--gold)'; if(v>=380) return 'var(--text)'; return 'var(--muted)'; }
function kdaColor(v){ if(v>=4) return 'var(--win-glow)'; if(v>=2.5) return 'var(--gold)'; if(v>=1.5) return 'var(--text)'; return 'var(--loss-glow)'; }

/* ---------- Draft / counter-pick ---------- */
function heroIcon(short,size){
  if(!short) return `<i class="ic" style="display:inline-block;width:${size}px;height:${size}px"></i>`;
  return `<img class="ic" src="${HERO_CDN}${short}.png" width="${size}" height="${size}" alt="" onerror="this.style.visibility='hidden'">`;
}

function heroPickerHTML(){
  const q=(state.draftPickerSearch||"").trim().toLowerCase();
  const taken=new Set([...state.draftEnemies, ...state.draftAllies]);
  const list=Object.entries(heroMap)
    .map(([id,m])=>({id:+id,name:m.name,short:m.short}))
    .filter(h=> !taken.has(h.id))
    .filter(h=> !q || h.name.toLowerCase().includes(q))
    .sort((a,b)=> a.name.localeCompare(b.name,'cs'));
  if(!list.length) return '<div class="picker-empty">Žádný hrdina nenalezen.</div>';
  return list.map(h=>{
    const pref=state.preferred.includes(h.id);
    return `<button class="hg" data-id="${h.id}" title="${escapeHtml(h.name)}">${heroIcon(h.short,38)}<span>${escapeHtml(h.name)}</span><span class="fav-star${pref?' on':''}" data-fav="${h.id}" title="přidat/odebrat z oblíbených">★</span></button>`;
  }).join("");
}

function wirePicker(){
  document.querySelectorAll(".hero-grid .fav-star").forEach(s=>{
    s.onclick=(ev)=>{ ev.stopPropagation(); ev.preventDefault(); togglePreferred(s.dataset.fav); };
  });
  document.querySelectorAll(".hero-grid .hg").forEach(el=>{
    el.onclick=()=>{
      const id=+el.dataset.id;
      const list = state.pickMode==="ally" ? state.draftAllies : state.draftEnemies;
      if(list.includes(id) || list.length>=5) return;
      list.push(id);
      state.laneOf[id] = heroPositions(id)[0] || 1;
      renderDraftPanel();
    };
  });
}

function teamChips(list, team){
  if(!list.length) return '<span class="chips-empty">zatím nikdo</span>';
  return list.map(id=>{
    const m=heroMap[id]||{name:"#"+id,short:""};
    const lane=state.laneOf[id] || 1;
    const badge = `<button class="lane-badge multi" data-id="${id}" title="klikni pro změnu lajny">${lane}</button>`;
    return `<span class="chip ${team}" data-id="${id}">${heroIcon(m.short,22)}<span class="cn">${escapeHtml(m.name)}</span>${badge}<button class="cx" data-id="${id}" title="odebrat">×</button></span>`;
  }).join("");
}

function favChips(){
  if(!state.preferred.length) return '<span class="chips-empty">žádní — označ hrdinu hvězdičkou ★</span>';
  return state.preferred.map(id=>{
    const m=heroMap[id]||{name:"#"+id,short:""};
    return `<span class="chip fav-chip" data-id="${id}">${heroIcon(m.short,22)}<span class="cn">${escapeHtml(m.name)}</span><button class="cx favx" data-fav="${id}" title="odebrat z oblíbených">×</button></span>`;

async function computeDraft(){
  const out=$("#draftResults");
  if(!out) return;
  if(!state.draftEnemies.length){ out.innerHTML='<div class="empty">Vyber aspoň jednoho nepřítele a objeví se nejlepší protipicky.</div>'; return; }

  const missing=state.draftEnemies.filter(id=> !state.matchupCache[id]);
  if(missing.length){
    out.innerHTML='<div class="status" style="padding:30px 10px"><div class="spinner"></div>Načítám countery…</div>';
    try{
      await Promise.all(missing.map(async id=>{
        const data=await getJSON(`https://api.opendota.com/api/heroes/${id}/matchups`);
        const map={};
        (data||[]).forEach(r=>{ map[r.hero_id]={g:r.games_played||0,w:r.wins||0}; });
        saveMatchup(id,map);
      }));
    }catch(e){
      out.innerHTML='<div class="empty" style="color:var(--loss-glow)">Nepodařilo se načíst matchup data ('+e.message+'). OpenDota má limit ~60 dotazů/min.</div>';
      return;
    }
  }
  renderDraftResults();
}

function ensureBaseWR(cb){
  if(state.baseWR){ cb&&cb(); return; }
  if(cb){ (state._bwrWaiters=state._bwrWaiters||[]).push(cb); }
  if(state.baseWRLoading) return;
  state.baseWRLoading=true;
  (async()=>{
    try{
      const data = state.metaStats || await getJSON("https://api.opendota.com/api/heroStats");
      if(!state.metaStats) state.metaStats=data;
      const map={};
      (data||[]).forEach(h=>{ let p=0,w=0; for(let i=1;i<=8;i++){ p+=h[i+"_pick"]||0; w+=h[i+"_win"]||0; } if(p>0) map[h.id]=w/p; });
      state.baseWR=map;
    }catch(e){}
    state.baseWRLoading=false;
    const ws=state._bwrWaiters||[]; state._bwrWaiters=[];
    ws.forEach(f=>{ try{ f(); }catch(e){} });
  })();
}

function renderDraftResults(){
  const out=$("#draftResults");
  if(!out || !state.draftEnemies.length) return;
  const enemies=state.draftEnemies;

  const my={};
  state.heroes.forEach(h=>{ my[h.id]={g:h.self.g,w:h.self.w}; });

  let cands=Object.entries(heroMap).map(([id,m])=>({id:+id,name:m.name,short:m.short}))
    .filter(h=> !enemies.includes(h.id) && !state.draftAllies.includes(h.id));
  if(state.draftStrictPos && state.draftPos){
    cands=cands.filter(h=> heroMatchesPos(h.id, state.draftPos));
  }
  if(state.draftOnlyMine){
    cands=cands.filter(h=>{ const mw=my[h.id]; return mw && mw.g>=Math.max(1,state.minGames); });
  }

  // celkové win raty (kvůli očištění o sílu hrdinů) – načti na pozadí
  if(!state.baseWR) ensureBaseWR(()=>{ if(state.tab==="draft") renderDraftResults(); });
  const bwr = state.baseWR || {};
  const MIN_MU = 50; // minimální vzorek matchupu, ať +50 z pár her nezkresluje

  const scored=cands.map(h=>{
    let sum=0,n=0; const per=[];
    enemies.forEach(eid=>{
      const map=state.matchupCache[eid]; if(!map) return;
      const m=map[h.id];
      if(m && m.g>=MIN_MU){
        const hVsE = 1-(m.w/m.g);               // win rate kandidáta proti nepříteli
        let adv;
        if(bwr[h.id]!=null && bwr[eid]!=null)   // očištěno o sílu obou hrdinů (Dotabuff styl)
          adv = (hVsE - (0.5 + bwr[h.id] - bwr[eid]))*100;
        else
          adv = (hVsE - 0.5)*100;               // fallback, než se načtou baseline WR
        sum+=adv; n++; per.push({eid,adv});
      }
    });
    const adv = n? sum/n : null;
    const pref = state.preferred.includes(h.id);
    const score = adv==null ? null : Math.max(-50, Math.min(100, Math.round(50 + adv*5 + (pref?PREF_BONUS:0))));
    return {...h, adv, n, per, my:my[h.id], pref, score};
  }).filter(r=> r.adv!=null);

  scored.sort((a,b)=> b.score-a.score);

  if(!scored.length){
    const hints=[];
    if(state.draftStrictPos && state.draftPos) hints.push("vypnout striktní filtr pozice");
    if(state.draftOnlyMine) hints.push("vypnout „jen hrdinové, které hraju“");
    out.innerHTML='<div class="empty">Žádní hrdinové'+(hints.length?' — zkus '+hints.join(" nebo ")+'.':'.')+'</div>';
    return;
  }
  const top=state.draftOnlyMine?scored:scored.slice(0,18);

  const laneFoes = state.draftPos ? (LANE_OPP[state.draftPos]||[]) : [];
  let html=`<div class="note"><b>Skóre 1–100</b> a známka (E → S+) podle toho, jak hrdina countruje vybrané nepřátele — očištěno o celkovou sílu hrdinů (styl „advantage" na Dotabuffu), ne syrový win rate. Silný pub hrdina (např. Broodmother) tak nedostane plusy proti svým counterům jen proto, že obecně vyhrává. <span style="color:var(--gold)">★ oblíbení</span> mají +${PREF_BONUS} bodů. Malé ikony vpravo = výhoda proti jednotlivcům (záporná = je to jeho counter).${laneFoes.length?' Zlatě orámovaný = pravděpodobný <b>lane oponent</b>.':''} <b>Klikni na jméno hrdiny</b> → jeho build, countery a timingy níže.</div>
  <table><thead><tr>
    <th style="text-align:center">#</th><th>Hrdina</th><th>Skóre</th>
    <th>Proti jednotlivcům</th>${state.draftOnlyMine?'<th>Tvoje WR</th>':''}
  </tr></thead><tbody>`;

  top.forEach((r,i)=>{
    const gi=gradeInfo(r.score);
    const pe=r.per.map(p=>{
      const mm=heroMap[p.eid]||{short:"",name:""};

      return `<span class="pe${foe?' lane-foe':''}" title="${escapeHtml(mm.name)}${foe?' (lane oponent)':''}: ${p.adv>=0?'+':''}${p.adv.toFixed(1)} %">${heroIcon(mm.short,18)}<i style="color:${c}">${p.adv>=0?'+':''}${p.adv.toFixed(0)}</i></span>`;
    }).join("");
    let myCell="";
    if(state.draftOnlyMine){
      const mw=r.my; const w=(mw&&mw.g)?Math.round(mw.w/mw.g*100):0;
      myCell=`<td class="cg">${(mw&&mw.g)?w+'% <span class="kda-sub">('+mw.g+')</span>':'—'}</td>`;
    }
    html+=`<tr${r.pref?' class="pref-row"':''}>
      <td style="text-align:center;color:var(--muted-dim);font-weight:700">${i+1}</td>
      <td class="hero"><button class="fav-row${r.pref?' on':''}" data-fav="${r.id}" title="oblíbený">★</button>${heroIcon(r.short,30)}<span class="go-build" data-id="${r.id}" title="zobrazit item build">${escapeHtml(r.name)}</span></td>

      <td><div class="pe-row">${pe}</div></td>
      ${myCell}
    </tr>`;
  });
  html+=`</tbody></table>`;
  out.innerHTML=html;

/* ---------- Build / item timings ---------- */
const ITEM_CDN = "https://cdn.cloudflare.steamstatic.com";
const ITEMS_LS_KEY = "dota_items_v1";

async function ensureItemConst(){
  if(state.itemConst) return state.itemConst;
  try{ const raw=localStorage.getItem(ITEMS_LS_KEY); if(raw){ const o=JSON.parse(raw); if(o&&o.byId){ state.itemConst=o; return o; } } }catch(e){}
  const data=await getJSON("https://api.opendota.com/api/constants/items");
  const byId={}, byName={};
  Object.entries(data||{}).forEach(([name,v])=>{
    if(!v || v.id==null) return;
    const meta={id:v.id, name, dname:v.dname||name, img:v.img?(ITEM_CDN+v.img):"", cost:v.cost||0};
    byId[v.id]=meta; byName[name]=meta;
  });
  const o={byId,byName};
  state.itemConst=o;
  try{ localStorage.setItem(ITEMS_LS_KEY, JSON.stringify(o)); }catch(e){}
  return o;
}

function topItems(map, ic, n, minCost){
  return Object.entries(map||{})
    .map(([id,c])=>({c:+c, meta:ic.byId[+id]}))
    .filter(x=> x.meta && !x.meta.name.startsWith("recipe") && (!minCost || x.meta.cost>=minCost))
    .sort((a,b)=> b.c-a.c).slice(0,n);
}
function computeTimings(rows, ic){
  const byItem={};
  (rows||[]).forEach(r=>{
    const g=+r.games||0, w=+r.wins||0, t=+r.time||0;
    if(!g) return;
    const o=byItem[r.item]||(byItem[r.item]={total:0,wins:0,bg:-1,bt:0});
    o.total+=g; o.wins+=w;
    if(g>o.bg){ o.bg=g; o.bt=t; }
  });
  let arr=Object.entries(byItem).map(([name,o])=>{
    const meta=ic.byName[name]; if(!meta) return null;
    return {dname:meta.dname, img:meta.img, minute:Math.round(o.bt/60), wr:o.total?o.wins/o.total:0, games:o.total};
  }).filter(Boolean);
  arr.sort((a,b)=> b.games-a.games);
  arr=arr.slice(0,12);
  arr.sort((a,b)=> a.minute-b.minute);
  return arr;
}

async function loadBuild(id){
  state.buildLoading=true;
  const out=$("#buildOut");
  if(out) out.innerHTML='<div class="status" style="padding:34px 10px"><div class="spinner"></div>Načítám build a timingy…</div>';
  try{
    const ic=await ensureItemConst();
    if(!state.buildCache[id]){
      const [pop, timings]=await Promise.all([
        getJSON(`https://api.opendota.com/api/heroes/${id}/itemPopularity`),
        getJSON(`https://api.opendota.com/api/scenarios/itemTimings?hero_id=${id}`),
      ]);
      state.buildCache[id]={
        start: topItems(pop&&pop.start_game_items, ic, 8, 0),
        early: topItems(pop&&pop.early_game_items, ic, 8, 0),
        mid:   topItems(pop&&pop.mid_game_items, ic, 8, 1000),
        late:  topItems(pop&&pop.late_game_items, ic, 8, 1500),
        timeline: computeTimings(timings, ic),
      };
    }
    if(!state.buildCache[id].hard){
      if(!state.matchupCache[id]){
        try{
          const mu=await getJSON(`https://api.opendota.com/api/heroes/${id}/matchups`);
          const map={}; (mu||[]).forEach(r=>{ map[r.hero_id]={g:r.games_played||0,w:r.wins||0}; });
          saveMatchup(id,map);
        }catch(e){}
      }
      const mm=state.matchupCache[id]||{};
      const arr=Object.entries(mm).map(([oid,rec])=>({id:+oid,g:rec.g,wr:rec.g?rec.w/rec.g:null}))
        .filter(x=> x.wr!=null && heroMap[x.id]);
      const maxG=Math.max(1,...arr.map(x=>x.g));
      const sig=arr.filter(x=> x.g>=Math.max(40,maxG*0.1)); // odfiltruj vzácné dvojice
      const base=sig.length>=10?sig:arr;
      const sorted=base.slice().sort((a,b)=> a.wr-b.wr);
      const dec=x=>({id:x.id,g:x.g,wr:x.wr,name:(heroMap[x.id]||{}).name,short:(heroMap[x.id]||{}).short});
      state.buildCache[id].hard=sorted.slice(0,8).map(dec);
      state.buildCache[id].easy=sorted.slice(-8).reverse().map(dec);
    }
    state.buildLoading=false;
    if(state.buildHero===id) renderBuildResult(id);
  }catch(e){
    state.buildLoading=false;
    if($("#buildOut")) $("#buildOut").innerHTML='<div class="empty" style="color:var(--loss-glow)">Nepodařilo se načíst build ('+e.message+'). OpenDota má limit ~60 dotazů/min.</div>';
  }
}

    <div class="bsec-t" style="margin-top:18px">Timingy klíčových itemů</div>

const COUNTER_API = "/api/counters"; // serverless STRATZ proxy (rank-filtrované countery)
function hcKey(id){ return id + "_" + state.counterBracket; }
function counterUrl(id){
  return state.counterBracket==="all"
    ? `https://api.opendota.com/api/heroes/${id}/matchups`
    : `${COUNTER_API}?hero=${id}&bracket=${encodeURIComponent(state.counterBracket)}`;
}
function parseMatchups(mu){
  const list=[];
  (mu||[]).forEach(r=>{
    if(!r) return;
    const oid = r.hero_id!=null ? +r.hero_id : null;
    const g = +(r.games_played!=null ? r.games_played : (r.games!=null ? r.games : 0)) || 0;
    const w = +(r.wins!=null ? r.wins : (r.win!=null ? r.win : 0)) || 0;
    if(oid==null || !heroMap[oid] || g<=0) return;
    list.push({ id:oid, g, w });   // w = výhry VYBRANÉHO hrdiny proti oid
  });
  return list;
}
async function loadCounter(id){
  const key=hcKey(id);
  if(state.hcLoadingId===key) return;
  state.hcLoadingId=key; state.hcErr=null;
  try{
    const mu = await getJSON(counterUrl(id));
    if(mu && mu.error) throw new Error(mu.error);
    state.hcData[key]=parseMatchups(mu);
  }catch(e){ state.hcErr=e.message||"chyba"; }
  state.hcLoadingId=null;
  if(state.tab==="counter" && state.counterHero===id) renderCounterResults();
}
function brLabel(b){
  return b==="all" ? "Všechny ranky" : b==="legend_ancient" ? "Ancient+ (Legend–Immortal)" : b==="divine_immortal" ? "Divine+ (Divine–Immortal)" : b;
}
function renderCounterPanel(){

    </div>`;
  panel.innerHTML = head + `<div id="hcOut">${state.counterHero?'<div class="status" style="padding:30px 10px"><div class="spinner"></div>Počítám countery…</div>':'<div class="empty">Vyber hrdinu nahoře a vypíšu jeho countery.</div>'}</div>`;
  const s=$("#hcSearch");
  if(s) s.oninput=e=>{ state.counterSearch=e.target.value; const g=$("#hcGrid"); if(g){ g.innerHTML=counterGridHTML(); wireCounterGrid(); } };
  const br=$("#hcBracket"); if(br) br.onchange=e=>{ state.counterBracket=e.target.value; hcPrewarmRefresh(); if(state.counterHero) renderCounterResults(); };
  const pb=$("#hcPrewarmBtn"); if(pb) pb.onclick=()=> prewarmCounters();
  hcPrewarmRefresh();

function hcPrewarmRefresh(){
  const el=$("#hcPrewarmStatus"); if(!el) return;
  const p=state.hcPrewarm, total=Object.keys(heroMap).length;
  const have=Object.keys(state.hcData).filter(k=> k.endsWith("_"+state.counterBracket) && state.hcData[k]).length;
  const btn=$("#hcPrewarmBtn");
  if(p.running){ el.textContent=`Načítám… ${p.done}/${p.total}`; if(btn) btn.disabled=true; }
  else { if(btn) btn.disabled=false; el.textContent = have ? `Načteno ${have}/${total} ✓` : ""; }
}
async function prewarmCounters(){
  if(state.hcPrewarm.running) return;
  ensureBaseWR();
  const ids=Object.keys(heroMap).map(Number).filter(id=> !state.hcData[hcKey(id)]);
  if(!ids.length){ hcPrewarmRefresh(); return; }
  state.hcPrewarm={running:true, done:0, total:ids.length};
  hcPrewarmRefresh();
  await Promise.all(ids.map(async id=>{
    try{
      const mu=await getJSON(counterUrl(id));
      if(!(mu && mu.error)) state.hcData[hcKey(id)]=parseMatchups(mu);
    }catch(e){}
    state.hcPrewarm.done++; hcPrewarmRefresh();
  }));
  state.hcPrewarm.running=false;
  hcPrewarmRefresh();
  if(state.tab==="counter" && state.counterHero) renderCounterResults();
}
function renderCounterResults(){
  const id=state.counterHero; if(!id) return;
  const o=$("#hcOut"); if(!o) return;
  if(!state.baseWR){
    o.innerHTML='<div class="status" style="padding:30px 10px"><div class="spinner"></div>Stahuju celkové win raty…</div>';
    ensureBaseWR(()=>{ if(state.tab==="counter" && state.counterHero===id) renderCounterResults(); });
    return;
  }
  const data=state.hcData[hcKey(id)];
  if(!data){
    if(state.hcErr){ o.innerHTML='<div class="empty" style="color:var(--loss-glow)">Nepodařilo se načíst data ('+escapeHtml(state.hcErr)+').<br>'+(state.counterBracket==="all"?'OpenDota má limit ~60 dotazů/min — zkus za chvíli.':'Rank-filtr jede přes tvůj STRATZ backend — funguje až po nasazení na server (na file:// ne).')+'</div>'; return; }
    o.innerHTML='<div class="status" style="padding:30px 10px"><div class="spinner"></div>Načítám countery…</div>';
    loadCounter(id); return;
  }
  const wrX = state.baseWR[id]!=null ? state.baseWR[id] : 0.5;
  const MIN_G=20;
  const arr=data.filter(d=> d.g>=MIN_G).map(d=>{
    const oWinVsX = 1 - d.w/d.g;             // win rate countera proti hrdinovi
    const adv = (oWinVsX - (1 - wrX))*100;   // kdo ho poráží, očištěno o jeho sílu
    const m=heroMap[d.id]||{name:"#"+d.id,short:""};
    return {id:d.id, wr:oWinVsX, adv, g:d.g, name:m.name, short:m.short};
  });
  if(!arr.length){
    o.innerHTML='<div class="empty">Pro tohoto hrdinu se nenačetla data. Přepni tab a zkus znovu.</div>';
    state.hcData[hcKey(id)]=undefined;
    return;
  }
  const cols=POSITIONS.map(p=>{
    const list=arr.filter(o=> heroMatchesPos(o.id,p.id)).sort((a,b)=> b.adv-a.adv).slice(0,6);
    const rows = list.length ? list.map((o,i)=>`
      <div class="hc-row">
        <span class="hc-rank">${i+1}</span>
        <img class="hc-ic" src="${HERO_CDN}${o.short}.png" alt="" onerror="this.style.visibility='hidden'">
        <span class="hc-name">${escapeHtml(o.name)}</span>
        <span class="hc-wr2" title="win rate proti tomuto hrdinovi">${Math.round(o.wr*100)}%</span>
        <span class="hc-adv" style="color:${o.adv>=0?'var(--win-glow)':'var(--loss-glow)'}" title="výhoda po očištění o sílu hrdiny">${o.adv>=0?'+':''}${o.adv.toFixed(1)}</span>
      </div>`).join("") : '<div class="chips-empty" style="padding:8px">—</div>';
    return `<div class="hc-col"><div class="hc-h">${p.label}<span>${p.sub}</span></div>${rows}</div>`;
  }).join("");
  const m=heroMap[id]||{name:"#"+id,short:""};
  o.innerHTML=`
    <div class="hc-target">${heroIcon(m.short,42)}<div><div class="bh-name">Countery na ${escapeHtml(m.name)}</div><div class="bh-sub">${brLabel(state.counterBracket)} · % = win rate countera · číslo = výhoda po očištění · top 6 na pozici · zváženo ${arr.length} hrdinů</div></div></div>
    <div class="hc-grid">${cols}</div>
    <div class="note">Řadím podle toho, <b>kdo tohoto hrdinu poráží</b> — win rate proti němu očištěný o jeho <b>vlastní celkovou sílu</b> (aby vylezly i countery na silné pub hrdiny jako Brood/Huskar). Zelené = poráží ho víc, než by čekal; červené = spíš mu podléhá. Data ze <b>všech ranků</b>, matchupy s aspoň 20 hrami.</div>
  `;
}

/* ---------- Historie zápasů ---------- */
const GAME_MODES = {1:"All Pick",2:"Captains Mode",3:"Random Draft",4:"Single Draft",5:"All Random",16:"Captains Draft",18:"Ability Draft",22:"All Pick",23:"Turbo"};
function matchMode(gm, lt){
  if(gm===23) return "Turbo";
  if(lt===7) return "Ranked";
  if(lt===1) return "Bot/Practice";
  return "Unranked";
}
function matchClass(m){
  if(m.game_mode===23) return "turbo";
  if(m.lobby_type===7) return "ranked";
  if(m.lobby_type===1) return "bot";
  return "unranked";
}
function isWin(m){ return (m.player_slot<128)===m.radiant_win; }
function fmtDur(s){ s=+s||0; return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function fmtK(n){ n=+n||0; return n>=1000 ? (n/1000).toFixed(1).replace(/\.0$/,"")+"k" : ""+n; }
function timeAgo(ts){
  if(!ts) return "";
  const d=Date.now()/1000 - ts;
  if(d<3600) return "před "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400) return "před "+Math.round(d/3600)+" h";
  const days=Math.round(d/86400);
  if(days<30) return "před "+days+(days===1?" dnem":" dny");
  return "před "+Math.round(days/30)+" měs";
}
// Zjednodušený impact 1–100 z dostupných statistik (není to oficiální Stratz IMP)
function matchImpact(m){
  const kda=(m.kills + m.assists)/Math.max(1,m.deaths);
  const gpm=m.gold_per_min||0;
  const v = 50 + (kda-2.8)*7 + (m.kills+m.assists)*0.9 - m.deaths*2.2 + (gpm-400)*0.015;
  return Math.max(1, Math.min(100, Math.round(v)));
}
function impColor(v){ if(v>=72) return 'var(--win-glow)'; if(v>=56) return 'var(--gold)'; if(v>=42) return 'var(--text)'; return 'var(--loss-glow)'; }

function winrateWindows(all){
  const wins = all.map(isWin);
  const wins10 = (n)=>{ const k=Math.min(n,wins.length); let w=0; for(let i=0;i<k;i++) if(wins[i]) w++; return {n:k,w,l:k-w,wr:k?Math.round(w/k*1000)/10:0}; };
  const targets=[]; for(let n=5;n<=100;n+=5){ if(n<=wins.length) targets.push(n); }
  if(!targets.length && wins.length) targets.push(wins.length);
  if(targets.length && targets[targets.length-1]!==wins.length && wins.length<100) targets.push(wins.length);
  return targets.map(wins10);
}
function matchSummaryHTML(all){
  if(!all.length) return "";
  const wins=winrateWindows(all);
  const chips=wins.map(w=>`<div class="wrw" title="${w.w} výher / ${w.l} proher z posledních ${w.n}">
      <div class="wrw-n">${w.n}</div>
      <div class="wrw-wr" style="color:${wrColor(w.wr/100)}">${w.wr}%</div>
      <div class="wrw-rec">${w.w}–${w.l}</div>
    </div>`).join("");
  return `<div class="msum">
    <div class="msum-h">Winrate za posledních N zápasů</div>
    <div class="wrw-row">${chips}</div>
  </div>`;
}
function laneOutcome(md){
  const ps=md && md.players; if(!ps) return null;
  const me=ps.find(p=> String(p.account_id)===String(state.accId));
  if(!me || me.lane==null || !Array.isArray(me.gold_t) || me.gold_t.length<8) return null;
  const myTeamRad = me.player_slot<128;
  const opps=ps.filter(p=> (p.player_slot<128)!==myTeamRad && p.lane===me.lane && Array.isArray(p.gold_t) && p.gold_t.length>=8);
  if(!opps.length) return null;
  const at=arr=> arr[Math.min(10, arr.length-1)];
  const myG=at(me.gold_t);
  const oppG=opps.reduce((s,p)=>s+at(p.gold_t),0)/opps.length;
  if(myG > oppG*1.03) return "won";
  if(myG < oppG*0.97) return "lost";
  return "tie";
}
async function runLaneAnalysis(){
  if(state.laneLoading) return;
  state.laneLoading=true; state.laneProg=0; renderMatchesPanel();
  const ids=(state.matchHist||[]).slice(0,25).map(m=>m.match_id);
  let won=0,lost=0,tie=0,nodata=0;
  for(const id of ids){
    try{
      let md=state.matchDetailCache[id];
      if(!md){ md=await getJSON("https://api.opendota.com/api/matches/"+id); state.matchDetailCache[id]=md; }
      const r=laneOutcome(md);
      state.laneByMatch[id] = r || "nodata";
      if(r==="won") won++; else if(r==="lost") lost++; else if(r==="tie") tie++; else nodata++;
    }catch(e){ state.laneByMatch[id]="nodata"; nodata++; }
    state.laneProg++; if(state.tab==="matches") renderMatchesPanel();
  }
  state.laneStats={won,lost,tie,nodata,checked:ids.length};
  state.laneLoading=false;
  if(state.tab==="matches") renderMatchesPanel();
}

async function runParseMissing(){
  if(state.parseRunning) return;
  const ids=(state.matchHist||[]).slice(0,25).map(m=>m.match_id).filter(id=> state.laneByMatch[id]==="nodata");
  const todo=ids.slice(0,10);
  if(!todo.length) return;
  state.parseRunning=true; state.parseMsg="Žádám OpenDotu o parsování "+todo.length+" zápasů…";
  if(state.tab==="matches") renderMatchesPanel();
  await Promise.all(todo.map(async id=>{ try{ await fetch("https://api.opendota.com/api/request/"+id,{method:"POST"}); }catch(e){} }));
  let pending=todo.slice();
  for(let round=0; round<6 && pending.length; round++){
    state.parseMsg="Parsuji… kolo "+(round+1)+"/6, zbývá "+pending.length+" (může to chvíli trvat).";
    if(state.tab==="matches") renderMatchesPanel();
    await _sleep(13000);
    const still=[];
    for(const id of pending){
      try{
        const md=await getJSON("https://api.opendota.com/api/matches/"+id);
        state.matchDetailCache[id]=md;
        const r=laneOutcome(md);
        if(r){
          if(state.laneStats){
            state.laneStats.nodata=Math.max(0,state.laneStats.nodata-1);
            if(r==="won") state.laneStats.won++; else if(r==="lost") state.laneStats.lost++; else state.laneStats.tie++;
          }
          state.laneByMatch[id]=r;
        } else still.push(id);
      }catch(e){ still.push(id); }
    }
    pending=still;
    if(state.tab==="matches") renderMatchesPanel();
  }
  state.parseRunning=false;
  state.parseMsg = pending.length
    ? (pending.length+" zápasů se ještě parsuje, nebo už nemají dostupný replay (staré hry). Zkus Přepočítat za chvíli.")
    : "Hotovo — chybějící lajny doparsovány.";
  if(state.tab==="matches") renderMatchesPanel();
}

function pickGrade(heroId, oppIds){
  let sum=0,n=0;
  oppIds.forEach(e=>{
    const map=state.matchupCache[e]; if(!map) return;
    const m=map[heroId];
    if(m && m.g>0){ sum+=(1-(m.w/m.g)-0.5)*100; n++; }
  });
  if(!n) return null;
  const score=Math.max(1,Math.min(100,Math.round(50+(sum/n)*3)));
  return {score, gi:gradeInfo(score)};
}
function pickCell(heroId, oppIds){
  const ready = oppIds.every(e=> state.matchupCache[e]);
  if(!ready) return '<span class="grade-mini">…</span>';
  const pg=pickGrade(heroId, oppIds);
  if(!pg) return '<span class="cg">—</span>';
  return `<span class="grade" style="color:${pg.gi.c};border-color:${pg.gi.c}" title="skóre ${pg.score}">${pg.gi.g}</span>`;
}

    const pages = 1; // rychlé načtení; další zápasy přidá „Načíst další"
    let collected=[];
    for(let i=0;i<pages;i++){

      if(before) params.push("less_than_match_id="+before);
